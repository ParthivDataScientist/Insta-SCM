name: CI

on:
  push:
  pull_request:

jobs:
  lint-backend:
    name: Backend lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Ruff
        run: pip install ruff
      - name: Ruff check
        run: ruff check app tests

  typecheck-backend:
    name: Backend typecheck (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt mypy
      - name: Mypy (core packages)
        run: mypy app/core app/api/error_handlers.py app/api/middleware

  test-backend:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-
      - name: Install dependencies
        run: pip install -r requirements.txt pytest httpx
      - name: Run tests
        env:
          FEDEX_CLIENT_ID: ""
          FEDEX_CLIENT_SECRET: ""
          DHL_API_KEY: ""
          DHL_API_SECRET: ""
          API_KEY: ""
        run: pytest tests/ -v --tb=short

  frontend:
    name: Frontend typecheck and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: client
      - name: TypeScript check
        run: npm run typecheck
        working-directory: client
      - name: Production build
        run: npm run build
        working-directory: client
        env:
          VITE_API_URL: http://localhost:8001
