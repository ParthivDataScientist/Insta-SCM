version: "3.9"

services:
  backend:
    build: .
    container_name: instatrack-backend
    ports:
      - "8001:8001"
    volumes:
      # Persist the SQLite database outside the container
      - ./database:/app/database
    environment:
      - ENV=production
      - DATABASE_URL=sqlite:///./database/sql_app.db
      - FEDEX_CLIENT_ID=${FEDEX_CLIENT_ID}
      - FEDEX_CLIENT_SECRET=${FEDEX_CLIENT_SECRET}
      - FEDEX_URL=${FEDEX_URL}
      - DHL_API_KEY=${DHL_API_KEY}
      - DHL_API_SECRET=${DHL_API_SECRET}
      - API_KEY=${API_KEY}
      - ALLOWED_ORIGIN=${ALLOWED_ORIGIN:-http://localhost:5173}
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    container_name: instatrack-frontend
    working_dir: /app
    volumes:
      - ./client:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_PROXY_TARGET=http://backend:8001
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend
    profiles:
      - dev
